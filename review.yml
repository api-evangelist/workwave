aid: workwave
name: WorkWave
review:
  question: Does WorkWave Route Manager expose a documented public WebSocket API?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    The WorkWave Route Manager API delivers asynchronous results via HTTP
    callbacks (web-hooks): the platform POSTs notifications to a customer-
    configured callback URL. This is an outbound HTTP push, not a streaming
    transport. No HTTP Server-Sent Events (SSE) stream and no WebSocket
    surface is documented, so no AsyncAPI document was created. The webhook
    callback behavior is documented in the REST OpenAPI and review notes.
findings:
  summary: |
    WorkWave Route Manager (WWRM) does not publish a documented public
    WebSocket API. The API is a REST (HTTPS) interface under
    https://wwrm.workwave.com/api/v1 authenticated with an API key (UUID)
    supplied via the X-WorkWave-Key header or the `key` query parameter.
    Write operations (POST/PUT/DELETE) are asynchronous: they return a
    requestId immediately and the eventual outcome is delivered to a
    customer-registered HTTP callback (web-hook) URL via an outbound POST.
    Failed callbacks are retried up to 5 times at escalating intervals
    (20, 40, 60, 80, 100 seconds). No realtime, bidirectional WebSocket
    (ws:// or wss://) endpoint and no Server-Sent Events stream are
    documented for orders, routes, drivers, vehicles, or GPS tracking.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://wwrm.workwave.com/api/v1
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound HTTP POST callbacks to a customer-configured URL for async results, data changes, and route approvals. Not a streaming or WebSocket transport.
      documented: true
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the WorkWave Route Manager API reference as of the review date.

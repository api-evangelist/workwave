actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE streaming surface exists. The only asynchronous
    delivery mechanism is outbound HTTP web-hook callbacks, which are modeled
    as a Webhooks API entry in apis.yml and documented in the REST OpenAPI;
    no AsyncAPI document was created because there is no streaming transport
    to describe.
